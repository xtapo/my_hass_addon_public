name: "HASS-XT AI Vision"
version: "1.0.0"
slug: "hass_xt_vision"
description: "AI Motion Detection & Object Recognition Camera for Home Assistant"
url: "https://github.com/xtapo/HASS-XT"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
init: false
homeassistant_api: true
ingress: true
ingress_port: 8000
panel_icon: mdi:camera-iris
panel_title: "HASS-XT Vision"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Web Dashboard UI & Stream
map:
  - addon_config:rw
  - config:rw
  - share:rw
options:
  rtsp_url: "rtsp://192.168.1.100:554/stream1"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  motion_sensitivity: 25
  ai_confidence: 0.5
schema:
  rtsp_url: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_password: str?
  motion_sensitivity: int
  ai_confidence: float
